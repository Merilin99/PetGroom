# nginx για το production frontend:
# σερβίρει τα στατικά του React build και προωθεί τα /api στο backend container.

server {
  listen 80;

  root /usr/share/nginx/html;
  index index.html;

  # Τα API requests πάνε στο backend (όνομα service στο docker network)
  location /api/ {
    proxy_pass http://backend:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA fallback: τα routes (π.χ. /pets) τα χειρίζεται το react-router στον browser,
  # οπότε κάθε άγνωστο path επιστρέφει το index.html.
  location / {
    try_files $uri /index.html;
  }
}
