# Ξεχωριστό project name ώστε το dev να ΜΗΝ συγκρούεται με το production
# (docker-compose.prod.yml) όταν τρέχουν και τα δύο από τον ίδιο φάκελο.
name: petgroom-dev

services:
  mysql:
    image: mysql:8.4
    container_name: petgroom-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: petgroom
      MYSQL_USER: petgroom
      MYSQL_PASSWORD: petgroom
    ports:
      # 3307 εξωτερικά για να μη συγκρούεται με άλλες MySQL στο μηχάνημα
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro

volumes:
  mysql_data:
